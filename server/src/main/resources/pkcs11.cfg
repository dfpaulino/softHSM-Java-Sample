# SunPKCS11 provider configuration for SoftHSM
#
# Adjust 'library' to match your SoftHSM installation:
#   Debian/Ubuntu: /usr/lib/softhsm/libsofthsm2.so
#                  /usr/lib/x86_64-linux-gnu/softhsm/libsofthsm2.so
#   RHEL/Fedora:   /usr/lib64/pkcs11/libsofthsm2.so
#
# 'slotListIndex = 0' selects the first initialized token.
# Run 'softhsm2-util --show-slots' to list available slots/tokens.

name = SoftHSM
library = /usr/lib/softhsm/libsofthsm2.so
slotListIndex = 0
