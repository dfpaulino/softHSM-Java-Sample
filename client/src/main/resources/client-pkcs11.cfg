# SunPKCS11 provider config for the client mTLS identity token.
# Keep the name distinct from server config to avoid provider-name collisions.
name = SoftHSMClient
library = /usr/lib/softhsm/libsofthsm2.so

# Use a separate token/slot for the client identity.
# Adjust with: softhsm2-util --show-slots
slotListIndex = 1
